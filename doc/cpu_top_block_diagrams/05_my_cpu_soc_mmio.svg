<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,4 L0,8 Z" fill="#26323f"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}
      .title{font:700 30px Arial,sans-serif;fill:#172334}
      .sub{font:14px Arial,sans-serif;fill:#5b6572}
      .box{fill:#fff;stroke:#26323f;stroke-width:2;rx:8}
      .cpu{fill:#eaf3ff;stroke:#1e63b6;stroke-width:2;rx:8}
      .mem{fill:#fff3d8;stroke:#aa761d;stroke-width:2;rx:8}
      .io{fill:#edf7ed;stroke:#3c8d46;stroke-width:2;rx:8}
      .map{fill:#f0f2f5;stroke:#66717d;stroke-width:2;rx:8}
      .txt{font:16px Arial,sans-serif;fill:#172334}
      .small{font:12px Arial,sans-serif;fill:#334255}
      .bus{stroke:#26323f;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .ctrl{stroke:#1e63b6;stroke-width:2.2;fill:none;marker-end:url(#arrow);stroke-dasharray:8 6}
      .green{stroke:#3c8d46;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1500" height="900"/>
  <text class="title" x="44" y="58">my_cpu.sv SoC Wrapper and MMIO Map</text>
  <text class="sub" x="44" y="86">Benchmark-oriented wrapper around cpu_top with simple memories, UART and board-style MMIO.</text>

  <rect class="box" x="55" y="125" width="1390" height="650"/>
  <text class="small" x="78" y="154">module my_cpu</text>

  <rect class="cpu" x="120" y="285" width="260" height="170"/>
  <text class="txt" x="207" y="325">cpu_top</text>
  <text class="small" x="164" y="354">imem interface</text>
  <text class="small" x="164" y="376">dmem interface</text>
  <text class="small" x="164" y="398">optional debug outputs</text>

  <rect class="mem" x="520" y="170" width="270" height="120"/>
  <text class="txt" x="580" y="210">simple_inst_ram</text>
  <text class="small" x="578" y="238">1024 x 32, sync read</text>
  <text class="small" x="578" y="260">index addr[11:2]</text>

  <rect class="mem" x="520" y="455" width="270" height="120"/>
  <text class="txt" x="580" y="495">simple_data_ram</text>
  <text class="small" x="578" y="523">1024 x 32, byte write</text>
  <text class="small" x="578" y="545">selected by addr[31:28] == 6</text>

  <rect class="io" x="930" y="255" width="260" height="150"/>
  <text class="txt" x="1006" y="295">uart_minimal</text>
  <text class="small" x="968" y="325">DATA / STATUS / CTRL / BAUD</text>
  <text class="small" x="968" y="347">base 0x8001_0000</text>
  <text class="small" x="968" y="369">tx_valid/tx_data for TB</text>

  <rect class="io" x="930" y="455" width="260" height="120"/>
  <text class="txt" x="1010" y="495">Board MMIO</text>
  <text class="small" x="975" y="523">LED, SEG, SW, KEY, CNT</text>
  <text class="small" x="975" y="545">0x8020_0000 region</text>

  <rect class="map" x="1220" y="185" width="180" height="390"/>
  <text class="txt" x="1264" y="222">Read Mux</text>
  <text class="small" x="1248" y="252">ram_rdata</text>
  <text class="small" x="1248" y="282">uart_rdata</text>
  <text class="small" x="1248" y="312">led/seg mirror</text>
  <text class="small" x="1248" y="342">sw[31:0]</text>
  <text class="small" x="1248" y="372">sw[63:32]</text>
  <text class="small" x="1248" y="402">key</text>
  <text class="small" x="1248" y="432">cnt_reg</text>
  <text class="small" x="1248" y="482">registered back to</text>
  <text class="small" x="1248" y="504">cpu_dmem_rdata</text>

  <path class="bus" d="M380 330 H520 V230"/>
  <text class="small" x="405" y="314">imem_addr/en</text>
  <path class="bus" d="M520 260 H380 V360"/>
  <text class="small" x="405" y="382">imem_rdata</text>

  <path class="bus" d="M380 405 H450 V515 H520"/>
  <text class="small" x="408" y="493">dmem addr/wdata/wen/en</text>
  <path class="bus" d="M790 515 H1220"/>
  <text class="small" x="820" y="498">ram_rdata</text>
  <path class="bus" d="M1190 330 H1220"/>
  <path class="bus" d="M1190 515 H1220"/>
  <path class="bus" d="M1220 505 H420 V375 H380"/>
  <text class="small" x="650" y="690">registered cpu_dmem_rdata return</text>

  <path class="green" d="M450 405 V330 H930"/>
  <text class="small" x="635" y="315">uart_sel, uart_we, uart_re</text>
  <path class="green" d="M450 430 V515 H930"/>
  <text class="small" x="640" y="455">led/seg/sw/key/cnt selects</text>

  <rect class="map" x="520" y="645" width="670" height="70"/>
  <text class="small" x="548" y="674">Address decode: RAM 0x6xxx_xxxx, UART 0x8001_0000..0x8001_000f, Board MMIO 0x8020_0000 range</text>
  <text class="small" x="548" y="696">PERF_BENCH mode keeps UART transmit empty for fast benchmark logging while retaining serial TX behavior otherwise.</text>

  <rect class="io" x="120" y="580" width="260" height="110"/>
  <text class="txt" x="190" y="620">Top Ports</text>
  <text class="small" x="164" y="648">clk, clk_cnt, rst_n</text>
  <text class="small" x="164" y="670">led, seg, sw, key</text>
  <path class="ctrl" d="M250 580 V455"/>
</svg>
