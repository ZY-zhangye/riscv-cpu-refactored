<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="950" viewBox="0 0 1600 950">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,4 L0,8 Z" fill="#26323f"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}
      .title{font:700 30px Arial,sans-serif;fill:#172334}
      .note{font:14px Arial,sans-serif;fill:#5b6572}
      .stage{fill:#eaf3ff;stroke:#1e63b6;stroke-width:2;rx:8}
      .reg{fill:#fff3d8;stroke:#aa761d;stroke-width:2;rx:8}
      .logic{fill:#ffffff;stroke:#26323f;stroke-width:2;rx:8}
      .haz{fill:#fff0f0;stroke:#c34949;stroke-width:2;rx:8}
      .txt{font:16px Arial,sans-serif;fill:#172334}
      .small{font:12px Arial,sans-serif;fill:#334255}
      .bus{stroke:#26323f;stroke-width:2.3;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#1e63b6;stroke-width:2;fill:none;marker-end:url(#arrow);stroke-dasharray:7 6}
      .thin{stroke:#768390;stroke-width:1.5;fill:none;marker-end:url(#arrow)}
    </style>
