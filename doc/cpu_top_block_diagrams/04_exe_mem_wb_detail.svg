      .unit{fill:#edf7ed;stroke:#3c8d46;stroke-width:2;rx:8}
      .reg{fill:#fff3d8;stroke:#aa761d;stroke-width:2;rx:8}
      .warn{fill:#fff0f0;stroke:#c34949;stroke-width:2;rx:8}
      .txt{font:16px Arial,sans-serif;fill:#172334}
      .small{font:12px Arial,sans-serif;fill:#334255}
      .bus{stroke:#26323f;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .ctrl{stroke:#1e63b6;stroke-width:2.2;fill:none;marker-end:url(#arrow);stroke-dasharray:8 6}
      .green{stroke:#3c8d46;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
