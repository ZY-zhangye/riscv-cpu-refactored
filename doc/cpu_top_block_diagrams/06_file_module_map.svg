<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,4 L0,8 Z" fill="#26323f"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}
      .title{font:700 30px Arial,sans-serif;fill:#172334}
      .sub{font:14px Arial,sans-serif;fill:#5b6572}
      .file{fill:#ffffff;stroke:#26323f;stroke-width:2;rx:8}
      .top{fill:#eaf3ff;stroke:#1e63b6;stroke-width:2;rx:8}
      .leaf{fill:#edf7ed;stroke:#3c8d46;stroke-width:2;rx:8}
      .cfg{fill:#fff3d8;stroke:#aa761d;stroke-width:2;rx:8}
      .unused{fill:#f0f2f5;stroke:#66717d;stroke-width:2;rx:8;stroke-dasharray:7 5}
      .txt{font:15px Arial,sans-serif;fill:#172334}
      .small{font:12px Arial,sans-serif;fill:#334255}
      .bus{stroke:#26323f;stroke-width:2;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#1e63b6;stroke-width:2;fill:none;marker-end:url(#arrow);stroke-dasharray:8 6}
    </style>
  </defs>
  <rect class="bg" width="1600" height="1000"/>
  <text class="title" x="42" y="58">rtl/cpu_top File-to-Module Image Map</text>
  <text class="sub" x="42" y="86">Every SystemVerilog design file in rtl/cpu_top is represented as a module/file block.</text>

  <rect class="cfg" x="665" y="120" width="270" height="85"/>
  <text class="txt" x="744" y="154">defines.svh</text>
  <text class="small" x="705" y="181">widths, packets, opcodes, CSR IDs, MMIO, PC_START</text>

  <rect class="top" x="650" y="270" width="300" height="95"/>
  <text class="txt" x="748" y="305">cpu_top.sv</text>
  <text class="small" x="703" y="332">wires five stages, register files, CSR, memories</text>

  <rect class="file" x="100" y="455" width="190" height="85"/>
  <text class="txt" x="158" y="490">if_stage.sv</text>
  <text class="small" x="130" y="516">fetch, PC, BTB</text>
  <rect class="file" x="335" y="455" width="190" height="85"/>
  <text class="txt" x="393" y="490">id_stage.sv</text>
  <text class="small" x="366" y="516">decode, packets</text>
  <rect class="file" x="570" y="455" width="190" height="85"/>
  <text class="txt" x="623" y="490">exe_stage.sv</text>
  <text class="small" x="604" y="516">execute, branch</text>
  <rect class="file" x="805" y="455" width="190" height="85"/>
  <text class="txt" x="858" y="490">mem_stage.sv</text>
  <text class="small" x="840" y="516">load, exception</text>
  <rect class="file" x="1040" y="455" width="190" height="85"/>
  <text class="txt" x="1097" y="490">wb_stage.sv</text>
  <text class="small" x="1080" y="516">writeback</text>

  <rect class="leaf" x="125" y="665" width="200" height="85"/>
  <text class="txt" x="181" y="700">regfiles.sv</text>
  <text class="small" x="164" y="726">integer register file</text>
  <rect class="leaf" x="365" y="665" width="200" height="85"/>
  <text class="txt" x="426" y="700">reg_fpu.sv</text>
  <text class="small" x="414" y="726">FP register file</text>
  <rect class="leaf" x="605" y="665" width="200" height="85"/>
  <text class="txt" x="656" y="700">regfile_csr.sv</text>
  <text class="small" x="640" y="726">CSR and exception PC</text>
  <rect class="leaf" x="845" y="665" width="200" height="85"/>
  <text class="txt" x="904" y="700">mul.sv</text>
  <text class="small" x="887" y="726">multiply/divide unit</text>
  <rect class="leaf" x="1085" y="665" width="200" height="85"/>
  <text class="txt" x="1139" y="700">divider.sv</text>
  <text class="small" x="1125" y="726">division submodule</text>
  <rect class="leaf" x="1325" y="665" width="200" height="85"/>
  <text class="txt" x="1383" y="700">fpu.sv</text>
  <text class="small" x="1367" y="726">FPU placeholder</text>

  <rect class="top" x="1255" y="270" width="260" height="95"/>
  <text class="txt" x="1338" y="305">my_cpu.sv</text>
  <text class="small" x="1292" y="332">SoC wrapper: cpu_top, RAMs, UART, MMIO</text>

  <rect class="leaf" x="1255" y="455" width="260" height="85"/>
  <text class="txt" x="1316" y="490">simple_inst_ram</text>
  <text class="small" x="1302" y="516">defined inside my_cpu.sv</text>
  <rect class="leaf" x="1255" y="560" width="260" height="85"/>
  <text class="txt" x="1316" y="595">simple_data_ram</text>
  <text class="small" x="1302" y="621">defined inside my_cpu.sv</text>
  <rect class="leaf" x="1255" y="770" width="260" height="85"/>
  <text class="txt" x="1322" y="805">uart_minimal</text>
  <text class="small" x="1302" y="831">defined inside my_cpu.sv</text>

  <rect class="unused" x="75" y="815" width="260" height="85"/>
  <text class="txt" x="154" y="850">pipeline.sv</text>
  <text class="small" x="118" y="876">standalone memory wait-state shim</text>

  <path class="dash" d="M800 205 V270"/>
  <path class="dash" d="M800 205 C1020 210, 1250 230, 1385 270"/>
  <text class="small" x="882" y="226">all included modules consume defines.svh macros</text>

  <path class="bus" d="M650 315 C520 335, 230 370, 195 455"/>
  <path class="bus" d="M675 365 C600 390, 470 405, 430 455"/>
  <path class="bus" d="M760 365 C720 390, 675 410, 665 455"/>
  <path class="bus" d="M840 365 C880 390, 900 420, 900 455"/>
  <path class="bus" d="M910 365 C1030 390, 1120 420, 1135 455"/>
  <path class="bus" d="M735 365 C560 550, 260 580, 225 665"/>
  <path class="bus" d="M760 365 C600 540, 485 590, 465 665"/>
  <path class="bus" d="M800 365 V665"/>
  <path class="bus" d="M665 540 C760 600, 875 625, 945 665"/>
  <path class="bus" d="M945 665 H1085"/>
  <path class="bus" d="M720 540 C940 600, 1285 610, 1425 665"/>

  <path class="bus" d="M1255 315 H950"/>
  <path class="bus" d="M1385 365 V455"/>
  <path class="bus" d="M1385 540 V560"/>
  <path class="bus" d="M1385 645 V770"/>

  <path class="dash" d="M205 815 C250 700, 480 620, 570 540"/>
  <text class="small" x="260" y="790">available standalone helper, not instantiated by current cpu_top</text>
</svg>
