     id="path45" />
  <text
     x="287"
     y="309.10254"
     class="red"
     id="text45">mret 作为返回事件进入异常控制</text>
  <!-- Source side boxes -->
  <rect
     x="930"
     y="445"
     width="300"
     height="105"
     class="box"
     id="rect45" />
  <text
     x="1080"
     y="478"
     text-anchor="middle"
     class="t1"
     id="text46">异常来源</text>
  <text
     x="1080"
     y="505"
     text-anchor="middle"
     class="t2"
     id="text47">ID：ecall / ebreak / mret</text>
  <text
     x="1080"
     y="527"
     text-anchor="middle"
     class="t2"
     id="text48">MEM：IAM / LAM / SAM</text>
  <rect
     x="930"
     y="590"
     width="300"
     height="128"
     class="box"
     id="rect48" />
  <text
     x="1080"
     y="623"
     text-anchor="middle"
     class="t1"
     id="text49">精确异常保证</text>
  <text
     x="1080"
     y="650"
     text-anchor="middle"
     class="t2"
     id="text50">异常前指令已经提交</text>
  <text
     x="1080"
     y="672"
     text-anchor="middle"
     class="t2"
     id="text51">异常指令及后续指令写回被屏蔽</text>
  <text
     x="1080"
     y="694"
     text-anchor="middle"
     class="t2"
     id="text52">处理程序从 mtvec 精确入口开始</text>
