  <text
     x="690"
     y="44"
     text-anchor="middle"
     class="title"
     id="text3">图 6-6 CSR 与异常处理流程图</text>
  <text
     x="690"
     y="73"
     text-anchor="middle"
     class="sub"
     id="text4">异常以指令边界为单位提交：异常前指令完成，异常指令及其后续错误路径不会产生错误提交</text>
  <!-- Main flow -->
  <rect
     x="515"
     y="115"
     width="330"
     height="78"
     class="box"
     id="rect4" />
  <text
     x="680"
     y="148"
     text-anchor="middle"
     class="t1"
     id="text5">指令执行</text>
  <text
     x="680"
     y="172"
     text-anchor="middle"
     class="t2"
     id="text6">IF / ID / EXE / MEM 流水推进</text>
  <polygon
     points="680,240 825,318 680,396 535,318"
     class="diamond"
     id="polygon6" />
  <text
     x="680"
     y="305"
     text-anchor="middle"
     class="t1"
     id="text7">是否发生异常？</text>
  <text
     x="680"
     y="330"
     text-anchor="middle"
     class="t2"
     id="text8">exception_code[5]</text>
  <text
     x="680"
     y="352"
     text-anchor="middle"
     class="t2"
     id="text9">或 mret_jmp_flag</text>
  <rect
     x="930.07574"
     y="278.07574"
     width="299.84848"
     height="97.317719"
     class="normal"
     id="rect9" />
  <text
     x="1080"
     y="312"
     text-anchor="middle"
     class="t1"
     id="text10">否：正常提交/写回</text>
  <text
     x="1080"
     y="338"
     text-anchor="middle"
     class="t2"
     id="text11">MEM 生成 mem_result</text>
  <text
     x="1080"
     y="358"
     text-anchor="middle"
     class="t2"
     id="text12">WB 输出 regfile_wen/wdata</text>
  <rect
     x="515"
     y="445"
     width="330"
     height="78"
     class="trap"
     id="rect12" />
  <text
     x="680"
     y="478"
     text-anchor="middle"
     class="t1"
     id="text13">禁止错误提交</text>
  <text
     x="680"
     y="503"
     text-anchor="middle"
     class="t2"
     id="text14">flush 后续错误路径，关闭异常指令写回</text>
  <rect
     x="515.03217"
     y="570.03217"
     width="329.93567"
     height="92.650505"
     class="csr"
     id="rect14" />
  <text
     x="680"
     y="603"
     text-anchor="middle"
     class="t1"
     id="text15">记录 mepc</text>
  <text
     x="680"
     y="630"
     text-anchor="middle"
     class="t2"
     id="text16">mepc &lt;= mem_pc</text>
  <text
     x="680"
     y="650"
     text-anchor="middle"
     class="t2"
     id="text17">csr_wdata 在异常时选择当前指令 PC</text>
  <rect
     x="515"
     y="705"
     width="330"
     height="88"
     class="csr"
     id="rect17" />
  <text
     x="680"
     y="738"
     text-anchor="middle"
     class="t1"
     id="text18">写入 mcause / mtval</text>
  <text
     x="680"
     y="765"
     text-anchor="middle"
     class="t2"
     id="text19">mcause &lt;= exception_code[4:0]</text>
  <text
     x="680"
     y="785"
     text-anchor="middle"
     class="t2"
     id="text20">mtval &lt;= exception_mtval</text>
  <rect
     x="515"
     y="840"
     width="330"
     height="88"
     class="csr"
     id="rect20" />
  <text
     x="680"
     y="873"
     text-anchor="middle"
     class="t1"
     id="text21">修改 mstatus</text>
  <text
     x="680"
     y="900"
     text-anchor="middle"
     class="t2"
     id="text22">MPIE &lt;= MIE</text>
  <text
     x="680"
     y="920"
     text-anchor="middle"
     class="t2"
     id="text23">MIE &lt;= 0</text>
  <rect
     x="515"
     y="975"
     width="330"
     height="78"
     class="trap"
     id="rect23" />
  <text
     x="680"
     y="1008"
     text-anchor="middle"
     class="t1"
     id="text24">PC 跳转到 mtvec</text>
  <text
     x="680"
     y="1032"
     text-anchor="middle"
     class="t2"
     id="text25">exception_addr = mtvec</text>
  <rect
     x="100"
     y="975"
     width="305"
     height="78"
     class="handler"
     id="rect25" />
  <text
     x="252"
     y="1008"
     text-anchor="middle"
     class="t1"
     id="text26">执行异常处理程序</text>
  <text
     x="252"
     y="1032"
     text-anchor="middle"
     class="t2"
     id="text27">保存现场 / 处理异常原因</text>
  <rect
     x="100"
     y="840"
     width="305"
     height="88"
     class="handler"
     id="rect27" />
  <text
     x="252"
     y="873"
     text-anchor="middle"
     class="t1"
     id="text28">mret 返回</text>
  <text
     x="252"
     y="900"
     text-anchor="middle"
     class="t2"
     id="text29">MIE &lt;= MPIE</text>
  <text
     x="252"
     y="920"
     text-anchor="middle"
     class="t2"
     id="text30">MPIE &lt;= 1</text>
  <rect
     x="100"
     y="705"
     width="305"
     height="78"
     class="handler"
     id="rect30" />
  <text
     x="252"
     y="738"
     text-anchor="middle"
     class="t1"
     id="text31">PC 跳转到 mepc</text>
  <text
     x="252"
     y="762"
     text-anchor="middle"
     class="t2"
     id="text32">exception_addr = {mepc[31:2], 2'b0}</text>
  <rect
     x="100"
     y="570"
     width="305"
     height="78"
     class="normal"
     id="rect32" />
  <text
     x="252"
     y="603"
     text-anchor="middle"
     class="t1"
     id="text33">恢复正常执行</text>
  <text
     x="252"
     y="627"
     text-anchor="middle"
     class="t2"
     id="text34">从异常返回地址重新取指</text>
