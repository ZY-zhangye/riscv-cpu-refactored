  <text
     x="185"
     y="523"
     class="note"
     id="text55">说明：</text>
  <text
     x="185"
     y="552"
     class="note"
     id="text56">1. `lw` 的地址在 EXE 阶段计算，但真正的加载数据要到 MEM 阶段读出后才可用。</text>
  <text
     x="185"
     y="581"
     class="note"
     id="text57">2. 紧随其后的 `add` 在原本的 C4 EXE 阶段需要使用 x1，此时数据尚未及时到达，因此在 ID 后暂停一个周期。</text>
  <text
     x="185"
     y="610"
     class="note"
     id="text58">3. 暂停期间向 EXE 插入一个 bubble；下一周期 `add` 进入 EXE，可从 MEM/WB 或 MEM 结果路径获得正确操作数。</text>
  <rect
     x="155"
     y="645"
     width="1190"
     height="72"
     rx="12"
     fill="#fff7ed"
     stroke="#fb923c"
     stroke-width="1.4"
     id="rect58" />
  <text
     x="185"
     y="676"
     class="note"
     id="text59">源码对应：</text>
  <text
     x="275"
     y="676"
     class="note"
     id="text60">`exe_load_use_hazard` 命中时，`load_use_hazard` 拉高，使 `ds_ready_go = !load_use_hazard`，ID 阶段暂停；后续流水继续推进形成一个气泡。</text>
  <text
     x="185"
     y="704"
     class="note"
     id="text61">相关文件：`rtl/cpu_top/id_stage.sv` 中 load-use 冒险检测逻辑。</text>
