     id="path53" />
  <text
     x="928.13177"
     y="264.34796"
     class="green"
     id="text54">lw 的 load 数据在 MEM 后可用于前递</text>
  <rect
     x="155.06462"
     y="485.06461"
     width="1189.8707"
     height="140.80531"
     rx="11.998697"
     fill="#f8fafc"
