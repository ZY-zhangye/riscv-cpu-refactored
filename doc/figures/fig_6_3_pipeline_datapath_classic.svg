<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1060" viewBox="0 0 1900 1060">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2f8cff"/>
    </marker>
    <marker id="arrow-yellow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#f6c000"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#00d04f"/>
    </marker>
    <marker id="arrow-magenta" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#ff00d4"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#ff4040"/>
    </marker>
    <style>
      text { font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif; }
      .title { fill: #ffffff; font-size: 30px; font-weight: 700; }
      .subtitle { fill: #cbd5e1; font-size: 15px; }
      .block { fill: #dcecff; stroke: #87c7ff; stroke-width: 2; }
      .pipe { fill: #e8eef7; stroke: #f8fafc; stroke-width: 2; }
      .mux { fill: #dcecff; stroke: #87c7ff; stroke-width: 2; }
      .alu { fill: #dcecff; stroke: #87c7ff; stroke-width: 2; }
      .unit-title { fill: #000000; font-size: 18px; font-weight: 700; }
      .unit-text { fill: #111827; font-size: 13px; }
      .pipe-text { fill: #000000; font-size: 16px; font-weight: 700; }
      .wire-label { fill: #86bfff; font-size: 13px; font-weight: 700; }
      .pc-label { fill: #f6c000; font-size: 13px; font-weight: 700; }
      .ctrl-label { fill: #ff4ee8; font-size: 13px; font-weight: 700; }
      .fwd-label { fill: #00e66a; font-size: 13px; font-weight: 700; }
      .red-label { fill: #ff6060; font-size: 13px; font-weight: 700; }
      .blue-wire { stroke: #2f8cff; stroke-width: 2.2; fill: none; marker-end: url(#arrow-blue); }
      .blue-wire-thin { stroke: #2f8cff; stroke-width: 1.7; fill: none; marker-end: url(#arrow-blue); }
      .yellow-wire { stroke: #f6c000; stroke-width: 2.1; fill: none; marker-end: url(#arrow-yellow); }
      .green-wire { stroke: #00d04f; stroke-width: 2.0; fill: none; marker-end: url(#arrow-green); }
      .magenta-wire { stroke: #ff00d4; stroke-width: 2.0; fill: none; marker-end: url(#arrow-magenta); }
      .red-wire { stroke: #ff4040; stroke-width: 2.0; fill: none; marker-end: url(#arrow-red); stroke-dasharray: 8 6; }
      .no-arrow-blue { stroke: #2f8cff; stroke-width: 2.1; fill: none; }
      .no-arrow-green { stroke: #00d04f; stroke-width: 2.0; fill: none; }
      .no-arrow-yellow { stroke: #f6c000; stroke-width: 2.1; fill: none; }
    </style>
  </defs>

  <rect width="1900" height="1060" fill="#000000"/>
  <text x="950" y="42" text-anchor="middle" class="title">图 6-3 五级流水线数据通路图</text>
  <text x="950" y="70" text-anchor="middle" class="subtitle">参考教材式黑底数据通路风格，突出 PC、流水寄存器、执行单元、访存和写回路径</text>

  <!-- PC select and IF -->
  <polygon class="mux" points="55,205 105,175 105,295 55,265"/>
  <text x="80" y="222" text-anchor="middle" class="unit-title">PC</text>
  <text x="80" y="247" text-anchor="middle" class="unit-text">MUX</text>

  <rect class="block" x="135" y="410" width="85" height="78"/>
  <text x="178" y="448" text-anchor="middle" class="unit-title">PC</text>
  <text x="178" y="470" text-anchor="middle" class="unit-text">寄存器</text>

  <polygon class="alu" points="165,185 225,150 285,185 225,220"/>
  <text x="225" y="190" text-anchor="middle" class="unit-title">ADD</text>

  <rect class="block" x="130" y="545" width="160" height="118"/>
  <text x="210" y="592" text-anchor="middle" class="unit-title">指令</text>
  <text x="210" y="618" text-anchor="middle" class="unit-title">存储器</text>
  <text x="210" y="643" text-anchor="middle" class="unit-text">imem</text>

  <rect class="pipe" x="350" y="155" width="36" height="670"/>
  <text x="368" y="470" text-anchor="middle" class="pipe-text" transform="rotate(-90 368 470)">IF/ID</text>

  <!-- ID -->
  <rect class="block" x="440" y="205" width="150" height="88"/>
  <text x="515" y="242" text-anchor="middle" class="unit-title">译码器</text>
  <text x="515" y="267" text-anchor="middle" class="unit-text">opcode / funct</text>

  <rect class="block" x="425" y="420" width="230" height="150"/>
  <text x="540" y="455" text-anchor="middle" class="unit-title">寄存器堆</text>
  <text x="540" y="485" text-anchor="middle" class="unit-text">读寄存器 1</text>
  <text x="540" y="512" text-anchor="middle" class="unit-text">读寄存器 2</text>
  <text x="540" y="542" text-anchor="middle" class="unit-text">写寄存器</text>

  <rect class="block" x="460" y="670" width="135" height="58"/>
  <text x="528" y="706" text-anchor="middle" class="unit-title">扩展</text>

  <rect class="block" x="620" y="205" width="120" height="88"/>
  <text x="680" y="242" text-anchor="middle" class="unit-title">控制器</text>
  <text x="680" y="267" text-anchor="middle" class="unit-text">ctrl packet</text>

  <rect class="pipe" x="785" y="155" width="36" height="670"/>
  <text x="803" y="470" text-anchor="middle" class="pipe-text" transform="rotate(-90 803 470)">ID/EX</text>

  <!-- EX muxes and units -->
  <polygon class="mux" points="865,375 920,345 920,465 865,435"/>
  <text x="893" y="398" text-anchor="middle" class="unit-title">MUX</text>
  <text x="893" y="423" text-anchor="middle" class="unit-text">src1</text>

  <polygon class="mux" points="865,575 920,545 920,665 865,635"/>
  <text x="893" y="598" text-anchor="middle" class="unit-title">MUX</text>
  <text x="893" y="623" text-anchor="middle" class="unit-text">src2</text>

  <polygon class="alu" points="1010,415 1090,365 1170,415 1090,465"/>
  <text x="1090" y="421" text-anchor="middle" class="unit-title">ALU</text>

  <rect class="block" x="1015" y="515" width="150" height="72"/>
  <text x="1090" y="548" text-anchor="middle" class="unit-title">MUL / DIV</text>
  <text x="1090" y="572" text-anchor="middle" class="unit-text">乘除法</text>

  <rect class="block" x="1015" y="630" width="150" height="72"/>
  <text x="1090" y="663" text-anchor="middle" class="unit-title">Z-bitman</text>
  <text x="1090" y="687" text-anchor="middle" class="unit-text">位操作</text>

  <rect class="block" x="1030" y="225" width="125" height="72"/>
  <text x="1092" y="258" text-anchor="middle" class="unit-title">分支比较</text>
  <text x="1092" y="282" text-anchor="middle" class="unit-text">目标计算</text>

  <polygon class="mux" points="1210,440 1260,405 1260,565 1210,530"/>
  <text x="1235" y="480" text-anchor="middle" class="unit-title">结果</text>
  <text x="1235" y="505" text-anchor="middle" class="unit-title">MUX</text>

  <rect class="pipe" x="1310" y="155" width="36" height="670"/>
  <text x="1328" y="470" text-anchor="middle" class="pipe-text" transform="rotate(-90 1328 470)">EX/MEM</text>

  <!-- MEM and WB -->
  <rect class="block" x="1405" y="430" width="170" height="145"/>
  <text x="1490" y="482" text-anchor="middle" class="unit-title">数据存储器</text>
  <text x="1490" y="512" text-anchor="middle" class="unit-text">地址</text>
  <text x="1490" y="538" text-anchor="middle" class="unit-text">写数据 / 读数据</text>

  <rect class="block" x="1405" y="650" width="170" height="72"/>
  <text x="1490" y="680" text-anchor="middle" class="unit-title">异常检测</text>
  <text x="1490" y="704" text-anchor="middle" class="unit-text">地址非对齐</text>

  <rect class="pipe" x="1630" y="155" width="36" height="670"/>
  <text x="1648" y="470" text-anchor="middle" class="pipe-text" transform="rotate(-90 1648 470)">MEM/WB</text>

  <polygon class="mux" points="1710,390 1770,350 1770,530 1710,490"/>
  <text x="1740" y="430" text-anchor="middle" class="unit-title">写回</text>
  <text x="1740" y="455" text-anchor="middle" class="unit-title">MUX</text>
  <text x="1740" y="484" text-anchor="middle" class="unit-text">wb_data</text>

  <!-- Main blue datapath -->
  <path class="yellow-wire" d="M105 235 L135 235 L135 449"/>
  <path class="yellow-wire" d="M220 449 L265 449 L265 185 L165 185"/>
  <path class="yellow-wire" d="M285 185 L335 185 L335 175 L55 175 L55 205"/>
  <text x="292" y="169" class="pc-label">PC + 4</text>

  <path class="blue-wire" d="M178 488 L178 545"/>
  <path class="blue-wire" d="M290 604 L350 604"/>
  <text x="300" y="590" class="wire-label">instruction</text>
  <path class="blue-wire" d="M386 248 L440 248"/>
  <path class="blue-wire" d="M590 248 L620 248"/>
  <path class="magenta-wire" d="M740 248 L785 248"/>
  <text x="755" y="232" class="ctrl-label">控制包</text>

  <path class="blue-wire" d="M386 495 L425 495"/>
  <path class="blue-wire" d="M655 470 L785 470"/>
  <path class="blue-wire" d="M655 540 L785 540"/>
  <text x="668" y="455" class="wire-label">rs1_data</text>
  <text x="668" y="526" class="wire-label">rs2_data</text>
  <path class="blue-wire" d="M528 670 L528 630 L785 630"/>
  <text x="612" y="650" class="wire-label">imm</text>

  <path class="blue-wire" d="M821 405 L865 405"/>
  <path class="blue-wire" d="M821 605 L865 605"/>
  <path class="blue-wire" d="M920 405 L1010 415"/>
  <path class="blue-wire" d="M920 605 L990 605 L990 435 L1010 435"/>
  <path class="blue-wire-thin" d="M920 605 L990 605 L990 552 L1015 552"/>
  <path class="blue-wire-thin" d="M920 605 L990 605 L990 666 L1015 666"/>

  <path class="blue-wire" d="M1170 415 L1210 475"/>
  <path class="blue-wire-thin" d="M1165 552 L1190 552 L1190 500 L1210 500"/>
  <path class="blue-wire-thin" d="M1165 666 L1190 666 L1190 525 L1210 525"/>
  <path class="blue-wire" d="M1260 485 L1310 485"/>

  <path class="blue-wire" d="M1346 485 L1405 485"/>
  <path class="blue-wire" d="M1575 505 L1630 505"/>
  <path class="blue-wire" d="M1666 460 L1710 460"/>
  <path class="blue-wire" d="M1770 460 L1810 460 L1810 940 L540 940 L540 570"/>
  <text x="1070" y="965" text-anchor="middle" class="wire-label">写回数据 / 写回地址 / 写使能</text>

  <!-- WB MUX source labels -->
  <text x="1695" y="356" text-anchor="end" class="wire-label">ALU / MUL / DIV</text>
  <line x1="1698" y1="360" x2="1710" y2="400" stroke="#2f8cff" stroke-width="1.8"/>
  <text x="1695" y="392" text-anchor="end" class="wire-label">访存读数据</text>
  <line x1="1698" y1="395" x2="1710" y2="430" stroke="#2f8cff" stroke-width="1.8"/>
  <text x="1695" y="532" text-anchor="end" class="wire-label">PC+4 / CSR</text>
  <line x1="1698" y1="528" x2="1710" y2="500" stroke="#2f8cff" stroke-width="1.8"/>

  <!-- Branch and PC redirect -->
  <path class="yellow-wire" d="M1092 225 L1092 115 L80 115 L80 175"/>
  <text x="650" y="102" text-anchor="middle" class="pc-label">分支/跳转目标地址反馈到 PC MUX</text>
  <path class="red-wire" d="M1155 260 L1250 260 L1250 105 L108 105 L108 205"/>
  <text x="1260" y="250" class="red-label">br_taken / redirect</text>

  <!-- Forwarding green paths -->
  <path class="green-wire" d="M1260 525 L1260 760 L893 760 L893 665"/>
  <text x="1010" y="785" class="fwd-label">EXE 结果前递</text>
  <path class="green-wire" d="M1575 505 L1575 805 L875 805 L875 665"/>
  <text x="1210" y="830" class="fwd-label">MEM/WB 结果前递</text>

  <!-- CSR and exception -->
  <rect class="block" x="640" y="780" width="205" height="95"/>
  <text x="742" y="817" text-anchor="middle" class="unit-title">CSR 寄存器组</text>
  <text x="742" y="844" text-anchor="middle" class="unit-text">mepc / mtvec / mstatus</text>
  <path class="blue-wire-thin" d="M620 270 L605 270 L605 805 L640 805"/>
  <path class="blue-wire-thin" d="M845 830 L1490 830 L1490 722"/>
  <text x="1125" y="855" text-anchor="middle" class="wire-label">异常信息 / CSR 写回</text>
  <path class="red-wire" d="M640 850 L120 850 L120 295"/>
  <text x="270" y="875" class="red-label">exception_addr / mret 返回</text>

  <!-- Control lines -->
  <path class="magenta-wire" d="M680 293 L680 330 L1235 330 L1235 440"/>
  <text x="910" y="318" class="ctrl-label">执行单元选择 / 写回选择 / 访存控制</text>
  <path class="magenta-wire" d="M680 293 L680 358 L893 358"/>
  <path class="magenta-wire" d="M680 358 L680 558 L893 558"/>

  <!-- Legend -->
  <rect x="70" y="970" width="1750" height="58" fill="#101820" stroke="#475569" stroke-width="1.5"/>
  <line x1="105" y1="1000" x2="180" y2="1000" stroke="#2f8cff" stroke-width="2.2" marker-end="url(#arrow-blue)"/>
  <text x="198" y="1005" fill="#dbeafe" font-size="13">主数据通路</text>
  <line x1="355" y1="1000" x2="430" y2="1000" stroke="#f6c000" stroke-width="2.1" marker-end="url(#arrow-yellow)"/>
  <text x="448" y="1005" fill="#fef3c7" font-size="13">PC / 分支目标</text>
  <line x1="635" y1="1000" x2="710" y2="1000" stroke="#00d04f" stroke-width="2.0" marker-end="url(#arrow-green)"/>
  <text x="728" y="1005" fill="#dcfce7" font-size="13">前递路径</text>
  <line x1="900" y1="1000" x2="975" y2="1000" stroke="#ff00d4" stroke-width="2.0" marker-end="url(#arrow-magenta)"/>
  <text x="993" y="1005" fill="#fce7f3" font-size="13">控制信号</text>
  <line x1="1185" y1="1000" x2="1260" y2="1000" stroke="#ff4040" stroke-width="2.0" stroke-dasharray="8 6" marker-end="url(#arrow-red)"/>
  <text x="1278" y="1005" fill="#fee2e2" font-size="13">异常 / 重定向</text>
  <rect x="1485" y="984" width="34" height="32" fill="#e8eef7" stroke="#f8fafc" stroke-width="1.5"/>
  <text x="1532" y="1005" fill="#e2e8f0" font-size="13">流水寄存器</text>
</svg>
